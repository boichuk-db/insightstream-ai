name: Docker Build Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API Image
        run: docker build -t insightstream-api -f Dockerfile.api .

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Web Image
        run: docker build -t insightstream-web -f Dockerfile.web .
