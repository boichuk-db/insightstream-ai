version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            # Scoped here (not a committed repo-root .npmrc) — hoisted node_modules is needed
            # only for Amplify's SSR bundling step; a repo-wide .npmrc broke apps/api's
            # migration:run script under GitHub Actions/local dev. See PLAN.md and
            # docs/superpowers/specs/2026-07-06-scope-hoisted-linker-to-amplify-design.md.
            - echo "node-linker=hoisted" > ../../.npmrc
            - pnpm install --frozen-lockfile
        build:
          commands:
            - npx turbo build --filter=web
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
    appRoot: apps/web
